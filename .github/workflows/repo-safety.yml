name: Repo Safety

on:
  push:
  pull_request:

jobs:
  repo-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Scan tracked files for sensitive config
        run: node scripts/check-sensitive-config.mjs
